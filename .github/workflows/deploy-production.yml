name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  verify-production-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Confirm automatic deployment
        run: echo "Main was updated; waiting for the production services to deploy."
      - name: Wait for Render build
        run: sleep 180
      - name: Run blocking production smoke tests
        run: python tools/post_deploy_smoke.py
      - name: Deployment summary
        run: echo "Production deployment passed all smoke checks."
