services:
  - type: web
    name: prop-intelligence-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --app-dir python_backend --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSLMODE
        value: require
      - key: DATABASE_POOL_SIZE
        value: 5
      - key: ODDS_API_KEY
        sync: false
      - key: API_SPORTS_KEY
        sync: false
      - key: API_SPORTS_BASEBALL_KEY
        sync: false
      - key: WNBA_LEAGUE_ID
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://app.propsintell.com,https://www.propsintell.com,https://propsintell.com

  - type: web
    name: props-intelligence-app
    runtime: static
    buildCommand: bash render_build_web.sh
    staticPublishPath: build/web
    envVars:
      - key: API_BASE_URL
        value: https://api.propsintell.com
      - key: SUPABASE_URL
        value: https://doncoxjilytojmnpukxi.supabase.co
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: AUTH_EMAIL_REDIRECT_URL
        value: https://app.propsintell.com
      - key: ALLOW_PUBLIC_SIGNUP
        value: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
