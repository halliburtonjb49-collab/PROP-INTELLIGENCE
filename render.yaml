services:
  - type: web
    name: prop-intelligence-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --app-dir python_backend --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSLMODE
        value: require
      - key: DATABASE_POOL_SIZE
        value: 5
      - key: ODDS_API_KEY
        sync: false
      - key: API_SPORTS_KEY
        sync: false
      - key: API_SPORTS_BASEBALL_KEY
        sync: false
      - key: REVENUECAT_WEBHOOK_SECRET
        sync: false
      - key: REVENUECAT_CORE_PRODUCT_IDS
        sync: false
      - key: REVENUECAT_EDGE_PRODUCT_IDS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: REVENUECAT_PUBLIC_API_KEY
        sync: false
      - key: WNBA_LEAGUE_ID
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://app.propsintell.com,https://www.propsintell.com,https://propsintell.com
      - key: SLIP_DATABASE_PATH
        value: /var/data/prop_intelligence_tickets.db
      - key: PROP_CACHE_DB_PATH
        value: /var/data/prop_intelligence_cache.db
      - key: LIVE_ODDS_SYNC_MIN_SECONDS
        value: 300
      - key: ODDS_API_LOW_QUOTA_THRESHOLD
        value: 100
      - key: ODDS_API_QUOTA_RESERVE
        value: 25
      - key: ODDS_REGIONS
        value: us,us2
      - key: PREFERRED_BOOKMAKERS
        value: prizepicks,underdog,draftkings,sleeper,fanduel,betr
      - key: PROP_SYNC_SPORTS
        value: baseball_mlb,basketball_wnba,basketball_nba,americanfootball_nfl
      - key: ADMIN_API_KEY
        sync: false
      - key: PIPELINE_ALERT_WEBHOOK_URL
        sync: false
    disk:
      name: prop-intelligence-ticket-data
      mountPath: /var/data
      sizeGB: 1

  - type: cron
    name: prop-intelligence-historical-sync
    runtime: python
    schedule: "0 8 * * *"
    buildCommand: pip install -r requirements.txt -r requirements-historical.txt
    startCommand: python python_backend/scripts/sync_historical_daily.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSLMODE
        value: require
      - key: ODDS_API_KEY
        sync: false
      - key: API_SPORTS_KEY
        sync: false
      - key: PIPELINE_ALERT_WEBHOOK_URL
        sync: false

  - type: cron
    name: prop-intelligence-pregame-sync
    runtime: python
    schedule: "*/30 * * * *"
    buildCommand: pip install -r requirements.txt -r requirements-historical.txt
    startCommand: python python_backend/scripts/sync_pregame.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSLMODE
        value: require
      - key: ODDS_API_KEY
        sync: false
      - key: API_SPORTS_KEY
        sync: false
      - key: API_SPORTS_BASEBALL_KEY
        sync: false
      - key: PIPELINE_ALERT_WEBHOOK_URL
        sync: false
      - key: API_BASE_URL
        value: https://api.propsintell.com

  - type: web
    name: props-intelligence-app
    runtime: static
    buildCommand: bash render_build_web.sh
    staticPublishPath: build/web
    envVars:
      - key: API_BASE_URL
        value: https://api.propsintell.com
      - key: SUPABASE_URL
        value: https://doncoxjilytojmnpukxi.supabase.co
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: AUTH_EMAIL_REDIRECT_URL
        value: https://app.propsintell.com
      - key: ALLOW_PUBLIC_SIGNUP
        value: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
