<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="PROP INTELLIGENCE sports analytics and prop research.">
  <meta name="theme-color" content="#020609">
  <meta name="color-scheme" content="dark">
  <meta name="format-detection" content="telephone=no">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="PROP INTEL">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>PROP INTELLIGENCE</title>
  <link rel="manifest" href="manifest.json">
  <style>
    #pwa-install-card {
      position: fixed;
      z-index: 10000;
      right: max(16px, env(safe-area-inset-right));
      bottom: max(16px, env(safe-area-inset-bottom));
      display: none;
      align-items: center;
      gap: 10px;
      max-width: min(360px, calc(100vw - 32px));
      padding: 11px 12px;
      color: #f5f7fa;
      background: #08131d;
      border: 1px solid #ffc400;
      border-radius: 12px;
      box-shadow: 0 12px 36px rgba(0, 0, 0, .55);
      font: 700 13px/1.3 Arial, sans-serif;
    }
    #pwa-install-card button {
      min-height: 38px;
      padding: 0 13px;
      color: #06111b;
      background: #ffc400;
      border: 0;
      border-radius: 8px;
      font-weight: 900;
    }
    #pwa-install-dismiss {
      min-width: 34px;
      padding: 0 !important;
      color: #b7c2ce !important;
      background: transparent !important;
      font-size: 20px;
    }
    @media (min-width: 901px) and (pointer: fine) {
      #pwa-install-card { display: none !important; }
    }
  </style>
</head>
<body>
  <aside id="pwa-install-card" role="dialog" aria-label="Install PROP INTELLIGENCE">
    <span id="pwa-install-message">Install PROP INTELLIGENCE on this device.</span>
    <button id="pwa-install-action" type="button">INSTALL</button>
    <button id="pwa-install-dismiss" type="button" aria-label="Dismiss install prompt">×</button>
  </aside>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
  <script src="pwa_install.js" defer></script>
</body>
</html>
